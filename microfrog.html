<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MicroFrog — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e8e5de;
    --accent: #1a1a1a;
    --accent2: #4a6fa5;
    --text: #1a1a1a;
    --text-muted: #888880;
    --user-bubble: #1a1a1a;
    --user-text: #ffffff;
    --ai-bubble: #ffffff;
    --ai-text: #1a1a1a;
    --radius: 18px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 18px; height: 18px; }

  .logo-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .logo-tag {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: #4caf7d;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message-row {
    display: flex;
    padding: 6px 28px;
    gap: 12px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }

  .avatar.microfrog {
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
  }

  .avatar.user-av {
    background: var(--border);
    color: var(--text-muted);
  }

  .bubble {
    max-width: 68%;
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    position: relative;
  }

  .message-row.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 5px;
  }

  .message-row.ai .bubble {
    background: var(--ai-bubble);
    color: var(--ai-text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
  }

  .bubble-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    padding: 40px 28px;
    text-align: center;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    background: var(--accent);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }

  .welcome-icon svg { width: 28px; height: 28px; }

  #welcome h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  #welcome p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 340px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
    max-width: 500px;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14.5px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s ease;
  }

  #send-btn:hover { background: #333; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="3" fill="white"/>
        <circle cx="3" cy="3" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="15" cy="3" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="3" cy="15" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="15" cy="15" r="1.5" fill="white" opacity="0.6"/>
        <line x1="9" y1="6" x2="3" y2="3" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="9" y1="6" x2="15" y2="3" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="9" y1="12" x2="3" y2="15" stroke="white" stroke-width="0.8" opacity="0.5"/>
        <line x1="9" y1="12" x2="15" y2="15" stroke="white" stroke-width="0.8" opacity="0.5"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">MicroFrog</div>
      <div class="logo-tag">Multi-talented AI assistant</div>
    </div>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    Online
  </div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="5" fill="white"/>
        <circle cx="5" cy="5" r="2.5" fill="white" opacity="0.5"/>
        <circle cx="23" cy="5" r="2.5" fill="white" opacity="0.5"/>
        <circle cx="5" cy="23" r="2.5" fill="white" opacity="0.5"/>
        <circle cx="23" cy="23" r="2.5" fill="white" opacity="0.5"/>
        <line x1="14" y1="9" x2="5" y2="5" stroke="white" stroke-width="1" opacity="0.4"/>
        <line x1="14" y1="9" x2="23" y2="5" stroke="white" stroke-width="1" opacity="0.4"/>
        <line x1="14" y1="19" x2="5" y2="23" stroke="white" stroke-width="1" opacity="0.4"/>
        <line x1="14" y1="19" x2="23" y2="23" stroke="white" stroke-width="1" opacity="0.4"/>
      </svg>
    </div>
    <h1>MicroFrog</h1>
    <p>Your multi-talented AI assistant. Ask me anything — I'm here to help with writing, analysis, coding, ideas, and much more.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Write something for me</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 Give me an idea</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">📊 Explain a concept</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">🧠 Help me think</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💻 Help with code</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">🌍 Translate text</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="user-input" placeholder="Ask MicroFrog anything…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 8L2 2L5 8L2 14L14 8Z" fill="white"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Powered by Llama 3 · 70B · MicroFrog AI</div>
</div>

<script>
const HF_API_URL = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-70B-Instruct";
const HF_TOKEN = "YOUR_HUGGINGFACE_TOKEN_HERE"; // Replace with your token

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');

let conversationHistory = [];

const SYSTEM_PROMPT = `You are MicroFrog, a highly intelligent, multi-talented AI assistant. You are professional yet warm, concise yet thorough. You can help with writing, coding, analysis, brainstorming, translation, math, and any topic. Always respond helpfully and confidently. Keep responses clear and well-structured.`;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendSuggestion(btn) {
  inputEl.value = btn.textContent.replace(/^[^\w]+/, '');
  sendMessage();
}

function hideWelcome() {
  if (welcomeEl) {
    welcomeEl.style.display = 'none';
  }
}

function addMessage(role, text) {
  hideWelcome();
  const row = document.createElement('div');
  row.className = `message-row ${role === 'user' ? 'user' : 'ai'}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'user' ? 'user-av' : 'microfrog'}`;
  avatar.textContent = role === 'user' ? 'You' : 'MF';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    const name = document.createElement('div');
    name.className = 'bubble-name';
    name.textContent = 'MicroFrog';
    bubble.appendChild(name);
  }

  const content = document.createElement('div');
  content.innerHTML = formatText(text);
  bubble.appendChild(content);

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:#f0ede6;padding:1px 5px;border-radius:4px;font-family:DM Mono,monospace;font-size:13px">$1</code>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  hideWelcome();
  const row = document.createElement('div');
  row.className = 'message-row ai';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar microfrog';
  avatar.textContent = 'MF';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<div class="bubble-name">MicroFrog</div><div class="typing-dots"><span></span><span></span><span></span></div>`;

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...conversationHistory
    ];

    const response = await fetch(HF_API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${HF_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: buildPrompt(messages),
        parameters: {
          max_new_tokens: 600,
          temperature: 0.7,
          top_p: 0.9,
          do_sample: true,
          return_full_text: false
        }
      })
    });

    const data = await response.json();
    removeTyping();

    let reply = '';
    if (Array.isArray(data) && data[0]?.generated_text) {
      reply = data[0].generated_text.trim();
    } else if (data.error) {
      reply = `⚠️ ${data.error}. Please check your HuggingFace token.`;
    } else {
      reply = "I'm having trouble connecting right now. Please check your API token.";
    }

    // Clean up any trailing system tokens
    reply = reply.replace(/<\|.*?\|>/g, '').trim();

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);

  } catch (err) {
    removeTyping();
    addMessage('assistant', '⚠️ Connection error. Please check your HuggingFace API token and try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function buildPrompt(messages) {
  let prompt = '<|begin_of_text|>';
  for (const msg of messages) {
    if (msg.role === 'system') {
      prompt += `<|start_header_id|>system<|end_header_id|>\n\n${msg.content}<|eot_id|>`;
    } else if (msg.role === 'user') {
      prompt += `<|start_header_id|>user<|end_header_id|>\n\n${msg.content}<|eot_id|>`;
    } else if (msg.role === 'assistant') {
      prompt += `<|start_header_id|>assistant<|end_header_id|>\n\n${msg.content}<|eot_id|>`;
    }
  }
  prompt += '<|start_header_id|>assistant<|end_header_id|>\n\n';
  return prompt;
}
</script>
</body>
</html>
